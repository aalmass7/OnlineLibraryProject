<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Loans - BookVerse</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: siteHeader}"></div>

<main class="wrap section-spacer">
    <div class="section-title-row">
        <div>
            <p class="eyebrow">Account</p>
            <h1>My loans</h1>
        </div>
        <a class="btn btn-secondary small-btn" href="/">Browse more books</a>
    </div>

    <div class="flash-message success" th:if="${successMessage}" th:text="${successMessage}"></div>

    <div class="empty-state card-surface" th:if="${#lists.isEmpty(loans)}">
        <h3>No loans yet</h3>
        <p>Borrow books from the catalog or cart to see them here.</p>
    </div>

    <div class="table-card card-surface" th:if="${!#lists.isEmpty(loans)}">
        <table class="styled-table">
            <thead>
            <tr>
                <th>Book</th>
                <th>Borrowed at</th>
                <th>Due date</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="loan : ${loans}">
                <td th:text="${loan.book.title}">Book</td>
                <td th:text="${loan.borrowedAt}">2026-05-03</td>
                <td th:text="${loan.dueDate}">2026-05-17</td>
                <td><span class="badge subtle-badge" th:text="${loan.status}">ACTIVE</span></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
